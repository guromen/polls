<body>
{% load static %}
<link rel="stylesheet" href="{% static 'polls/style_result.css' %}">

    <div class="results-container">
        <h1>{{ question.question_text }}</h1>

        <ul>
            {% for choice in question.choice_set.all %}
                <li>
                    {{ choice.choice_text }}
                    — {{ choice.votes }}
                    vote{{ choice.votes|pluralize }}
                </li>
            {% endfor %}
        </ul>

        <div class="buttons">
            <a href="{% url 'polls:detail' question.id %}" class="btn">
                Проголосовать снова
            </a>

            <a href="{% url 'polls:index' %}" class="btn">
                На главную
            </a>
        </div>
    </div>
</body>
